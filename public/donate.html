<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Donate Food</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- navbar header shared with index -->
    <header class="navbar">
        <div class="Logo">
            <img src="Logo.png" alt="WasteToWealth Logo 🌱">
        </div>

        <nav class="nav-links">
            <a href="index.html#home">Home</a>
            <a href="index.html#overview">Overview</a>
            <a href="index.html#leaderboard">Leaderboard</a>
            <a href="index.html#impact">Impact</a>
            <a href="index.html#contact">Contact</a>
        </nav>

        <div class="login">
            <button onclick="donorLogin()">Donor Login</button>
            <button onclick="volunteerLogin()">Volunteer Login</button>
        </div>
    </header>

    <h1>Donate Food</h1>
    <form id="donateForm">
        <input type="text" name="restaurant" placeholder="Restaurant/Wedding Hall Name" required><br>
        <input type="text" name="location" placeholder="Location" required><br>
        <input type="number" name="quantity" placeholder="Quantity" required><br>
        <select name="foodType" required>
            <option value="">Select Food Type</option>
            <option value="Veg">Veg</option>
            <option value="Non-Veg">Non-Veg</option>
        </select><br>
        <input type="text" name="deliveryTime" placeholder="Delivery Time" required><br>
        <button type="submit">Donate</button>
    </form>

    <script src="script.js"></script>
</body>
</html>
